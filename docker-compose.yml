services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    volumes:
      - .:/app
    # utile surtout en Linux natif ; inoffensif sur Windows/WSL
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Optionnel : phpMyAdmin en Docker (UI sur http://localhost:8081)
  phpmyadmin:
    image: phpmyadmin:5-apache
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    environment:
      PMA_HOST: host.docker.internal   # cible MySQL Laragon
      PMA_PORT: 3306
      UPLOAD_LIMIT: 256M
    extra_hosts:
      - "host.docker.internal:host-gateway"
