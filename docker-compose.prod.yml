services:
  nginx:
    build: ./nginx
    depends_on:
      - web
    ports:
      - "80:80"                    # change en "8080:80" si le port 80 est déjà pris (Laragon)
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - staticfiles:/app/staticfiles:ro
    networks:
      - app_net
    restart: unless-stopped

  web:
    env_file: .env.prod
    # ❌ plus de depends_on: db
    ports: []                      # pas d'exposition directe, nginx reverse-proxy
    expose:
      - "8000"
    volumes:
      - staticfiles:/app/staticfiles
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import sys, urllib.request as u; r=u.urlopen('http://127.0.0.1:8000/', timeout=3); sys.exit(0 if 200 <= r.status < 400 else 1)"
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s
    networks:
      - app_net
    restart: unless-stopped
    # Utile si tu fais tourner la DB sur ta machine (Laragon) et que tu testes en local
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  staticfiles:

networks:
  app_net:
    driver: bridge
