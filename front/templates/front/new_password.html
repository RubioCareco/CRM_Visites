{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouveau mot de passe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'front/css/new_password.css' %}">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-container">
            <img src="{% static 'front/img/logo.png' %}" alt="Logo" class="logo">
            <h2>Entrez votre nouveau mot de passe</h2>

            <div class="form-box">
                <form method="post">
                    {% csrf_token %}
                    <div class="input-wrapper">
                        <i class="fa fa-lock icon"></i>
                        <input type="password" name="new_password" placeholder="Nouveau mot de passe" required>
                    </div>
                    <div class="input-wrapper">
                        <i class="fa fa-lock icon"></i>
                        <input type="password" name="confirm_password" placeholder="Confirmer votre mot de passe" required>
                    </div>
                    <button type="submit" class="btn-reset">Valider</button>
                </form>

                <a href="{% url 'login' %}" class="forgot-password">← Retour</a>
            </div>
        </div>
    </div>

    <div id="messageModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <p id="modalMessage"></p>
        </div>
    </div>

    <script>
        const form = document.querySelector('form');
        const messageModal = document.getElementById('messageModal');
        const closeModal = document.querySelector('.close');
        const modalMessage = document.getElementById('modalMessage');
        const inputs = form.querySelectorAll('input');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const newPassword = form.new_password.value;
            const confirmPassword = form.confirm_password.value;

            if (newPassword === confirmPassword) {
                modalMessage.textContent = "Votre mot de passe a été modifié avec succès !";
                modalMessage.style.color = "#4CAF50";
                inputs.forEach(input => input.classList.remove('input-error'));
            } else {
                modalMessage.textContent = "Les mots de passe ne correspondent pas. Veuillez réessayer.";
                modalMessage.style.color = "#f55";
                inputs.forEach(input => input.classList.add('input-error'));
            }
            messageModal.style.display = "block";
        });

        closeModal.onclick = function() {
            messageModal.style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == messageModal) {
                messageModal.style.display = "none";
            }
        }
    </script>

</body>
</html>
