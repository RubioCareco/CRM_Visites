<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'front/css/profil.css' %}?v=1.2" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="profile-modal">
    <div class="profile-box">
      <div id="close-button" class="close-button">
        <i class="fa fa-times"></i>
      </div>
      <div class="profile-avatar">
        {{ commercial.prenom|slice:":1"|upper }}{{ commercial.nom|slice:":1"|upper }}
      </div>
      <h2>{{ commercial.prenom }} {{ commercial.nom|upper }}</h2>

      <form method="POST">
        {% csrf_token %}
        <div class="form-wrapper">
          <div class="profile-field">
            <i class="fa fa-user"></i>
            <input type="text" name="nom" value="{{ commercial.nom }}" placeholder="Nom" disabled />
          </div>
          <div class="profile-field">
            <i class="fa fa-user"></i>
            <input type="text" name="prenom" value="{{ commercial.prenom }}" placeholder="Prénom" disabled />
          </div>
          <div class="profile-field">
            <i class="fa fa-envelope"></i>
            <input type="email" name="email" value="{{ commercial.email }}" placeholder="Adresse e-mail" disabled />
          </div>
          <div class="profile-field">
            <i class="fa fa-phone"></i>
            <input type="text" name="telephone" value="{{ commercial.telephone }}" placeholder="Téléphone" disabled />
          </div>
          <div class="profile-field">
            <i class="fa fa-building"></i>
            <input type="text" name="site" value="{{ commercial.site_rattachement|default:'N/A' }}" placeholder="Site de rattachement" disabled />
          </div>

          {% if can_edit %}
          <div class="switch-absent is-disabled">
            <label for="is_absent">Commercial absent</label>
                         <label class="switch-toggle">
               <input type="checkbox" id="is_absent" name="is_absent" value="1" {% if commercial.is_absent %}checked{% endif %} disabled />
               <span class="switch-slider"></span>
             </label>
          </div>
          <button type="submit" class="edit-button" id="editProfileBtn">
            <i class="fa fa-pen"></i><span class="edit-button-label">Modifier le profil</span>
          </button>
          {% endif %}
        </div>
      </form>
    </div>
  </div>

  <script id="isProfilCommercial" type="application/json">{{ is_profil_commercial|yesno:'true,false'|lower }}</script>
  <script>
    document.querySelector('.close-button').addEventListener('click', () => {
      const role = "{{ role|default:'' }}";
      const isProfilCommercial = JSON.parse(document.getElementById('isProfilCommercial').textContent);
      if (isProfilCommercial) {
        window.location.href = "/profils-commerciaux/";
      } else if (role === "responsable" || role === "admin") {
        window.location.href = "/dashboard-responsable/";
      } else {
        window.location.href = "/dashboard-test/";
      }
    });
  
    document.addEventListener('DOMContentLoaded', function () {
      const editBtn = document.getElementById('editProfileBtn');
      const inputs = document.querySelectorAll('.profile-field input');
      const absentToggle = document.getElementById('is_absent');
      const absentSwitch = document.querySelector('.switch-absent');
      const form = document.querySelector('form');
      let isEditing = false;
  
      if (editBtn) {
        editBtn.addEventListener('click', function (e) {
            if (!isEditing) {
              e.preventDefault(); // Bloque l'envoi à la première étape
              inputs.forEach(input => {
                  input.disabled = false
              });
              if (absentToggle) absentToggle.disabled = false;
              if (absentSwitch) absentSwitch.classList.remove('is-disabled');
              editBtn.innerHTML = '<i class="fa fa-check"></i><span class="edit-button-label">Enregistrer</span>';
              isEditing = true;
            } else {
              // L'utilisateur veut enregistrer → on laisse le formulaire se soumettre
              form.submit(); // Forcer la soumission ici
            }
        });
      }
    });
  </script>
  

</body>
</html>
