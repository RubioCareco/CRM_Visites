name: crm_visites

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
      --default-authentication-plugin=caching_sha2_password
      --sql-mode=STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [app_net]

  web:
    build: .
    restart: unless-stopped
    env_file: .env                # en prod, .env.prod sera appliqué via l’override
    expose: ["8000"]              # visible seulement sur le réseau Docker
    volumes:
      - .:/app                    # pratique en dev; en prod l’override retire ce bind
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [app_net]

  # Outil DEV (facultatif)
  phpmyadmin:
    profiles: ["devtools"]
    image: phpmyadmin:5-apache
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"       # accessible localement uniquement
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 256M
    depends_on:
      db:
        condition: service_healthy
    networks: [app_net]

volumes:
  db_data:

networks:
  app_net:
    driver: bridge
