# nginx/conf.d/app.conf

# Backend Django sur le réseau Docker
upstream django_upstream {
    server web:8000;
    keepalive 32;
}

# ---- HTTP (80) : redirection vers HTTPS, ACME en clair ----
server {
    listen 80; listen [::]:80;
    server_name 51-45-16-124.nip.io 51-45-16-124.sslip.io;

    client_max_body_size 25m;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # ACME (certbot webroot)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        access_log off;
    }

    # Tout le reste -> HTTPS
    location / { return 301 https://$host$request_uri; }

    # Probe simple
    location = /healthz { add_header Content-Type text/plain; return 200 "ok\n"; }
}

# ---- HTTPS (443) : site sécurisé ----
server {
    listen 443 ssl; listen [::]:443 ssl;
    http2 on;
    server_name 51-45-16-124.nip.io;

    ssl_certificate     /etc/letsencrypt/live/51-45-16-124.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/51-45-16-124.nip.io/privkey.pem;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size 25m;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        proxy_pass         http://django_upstream;
        proxy_http_version 1.1;

        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   https;   # on force https
        proxy_set_header   X-Forwarded-Host    $host;
        proxy_set_header   X-Forwarded-Port    $server_port;

        proxy_set_header   Connection          "";
    }

    location = /healthz { add_header Content-Type text/plain; return 200 "ok\n"; }
}
