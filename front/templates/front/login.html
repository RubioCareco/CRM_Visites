<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion RUBIO</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'front/css/login.css' %}" />
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <img src="{% static 'front/img/Logo.png' %}" class="logo" alt="Logo Rubio">
      <p class="welcome-text">Bienvenue sur votre espace RUBIO</p>

      <div class="input-group">
        <label for="username">Nom d'utilisateur</label>
        <div class="input-icon">
          <i class="fas fa-user"></i>
          <input type="text" id="username" placeholder="Nom d'utilisateur" />
        </div>
      </div>

      <div class="input-group">
        <label for="password">Mot de passe</label>
        <div class="input-icon eye-container">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Mot de passe" />
          <i class="fa-solid fa-eye toggle-eye" id="togglePassword"></i>
        </div>
      </div>   

      <a href="{% url 'reset_password' %}" class="forgot-password">Mot de passe oublié ?</a>
      <button class="login-btn">Se connecter</button>
    </div>
  </div>

  <script>
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");
  
    togglePassword.addEventListener("click", function () {
      const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);
      this.classList.toggle("fa-eye");
      this.classList.toggle("fa-eye-slash");
    });
  </script>
  
</body>
</html>
