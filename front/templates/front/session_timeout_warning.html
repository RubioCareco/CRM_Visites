{% if request.session.show_timeout_warning %}
<!-- Token CSRF pour la requête AJAX -->
{% csrf_token %}
<div id="sessionTimeoutWarning" class="session-timeout-warning">
    <div class="session-timeout-content">
        <div class="session-timeout-header">
            <span class="session-timeout-icon">⏰</span>
            <h3>Session en cours d'expiration</h3>
        </div>
        <div class="session-timeout-body">
            <p>Votre session expirera dans <strong id="timeoutCountdown">{{ request.session.timeout_warning_minutes }}</strong> minute(s).</p>
            <p>Cliquez sur "Prolonger" pour rester connecté.</p>
        </div>
        <div class="session-timeout-actions">
            <button id="extendSession" class="btn-extend">Prolonger la session</button>
            <button id="logoutNow" class="btn-logout">Se déconnecter</button>
        </div>
    </div>
</div>

<style>
/* Styles pour l'alerte de déconnexion - Responsive */
.session-timeout-warning {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: fadeIn 0.3s ease-in;
}

.session-timeout-content {
    background: rgba(255, 255, 255, 11%);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 12px;
    padding: 30px;
    max-width: 90%;
    width: 400px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    animation: slideIn 0.3s ease-out;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.session-timeout-header {
    margin-bottom: 20px;
}

.session-timeout-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 10px;
}

.session-timeout-header h3 {
    margin: 0;
    color: #e74c3c;
    font-size: 1.5rem;
}

.session-timeout-body {
    margin-bottom: 25px;
    color: #fffdfd;
}

.session-timeout-body p {
    margin: 10px 0;
    font-size: 1rem;
}

.session-timeout-actions {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

.btn-extend, .btn-logout {
    padding: 12px 24px;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s ease;
    min-width: 120px;
}

.btn-extend {
    background: #27ae60;
    color: white;
}

.btn-extend:hover {
    background: #229954;
    transform: translateY(-2px);
}

.btn-logout {
    background: #e74c3c;
    color: white;
}

.btn-logout:hover {
    background: #c0392b;
    transform: translateY(-2px);
}

/* Responsive pour tablette */
@media (max-width: 768px) {
    .session-timeout-content {
        padding: 25px;
        width: 85%;
        max-width: 350px;
    }
    
    .session-timeout-header h3 {
        font-size: 1.3rem;
    }
    
    .session-timeout-body p {
        font-size: 0.95rem;
    }
    
    .session-timeout-actions {
        flex-direction: column;
        gap: 10px;
    }
    
    .btn-extend, .btn-logout {
        width: 100%;
        padding: 15px;
    }
}

/* Responsive pour mobile */
@media (max-width: 480px) {
    .session-timeout-content {
        padding: 20px;
        width: 90%;
        max-width: 300px;
    }
    
    .session-timeout-header h3 {
        font-size: 1.2rem;
    }
    
    .session-timeout-body p {
        font-size: 0.9rem;
    }
    
    .session-timeout-icon {
        font-size: 2.5rem;
    }
}

/* Animations */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideIn {
    from { 
        opacity: 0;
        transform: translateY(-20px) scale(0.95);
    }
    to { 
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

/* Mode sombre pour les écrans sombres */
@media (prefers-color-scheme: dark) {
    .session-timeout-content {
        background: rgba(44, 62, 80, 0.95);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .session-timeout-body {
        color: #ecf0f1;
    }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const warning = document.getElementById('sessionTimeoutWarning');
    const countdown = document.getElementById('timeoutCountdown');
    const extendBtn = document.getElementById('extendSession');
    const logoutBtn = document.getElementById('logoutNow');
    
    let countdownValue = parseInt(countdown.textContent);
    
    // Compte à rebours
    const countdownTimer = setInterval(function() {
        countdownValue--;
        countdown.textContent = countdownValue;
        
        if (countdownValue <= 0) {
            clearInterval(countdownTimer);
            // Redirection automatique vers la page de connexion
            window.location.href = '{% url "login" %}';
        }
    }, 60000); // Mise à jour toutes les minutes
    
    // Prolonger la session
    extendBtn.addEventListener('click', function() {
        // Appel AJAX pour prolonger la session
        fetch('{% url "extend_session" %}', {
            method: 'POST',
            headers: {
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
                'Content-Type': 'application/json',
            },
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                // Masquer l'alerte
                warning.style.display = 'none';
                clearInterval(countdownTimer);
                // Afficher un message de succès
                showMessage('Session prolongée avec succès !', 'success');
            }
        })
        .catch(error => {
            console.error('Erreur:', error);
            showMessage('Erreur lors de la prolongation de la session', 'error');
        });
    });
    
    // Se déconnecter maintenant
    logoutBtn.addEventListener('click', function() {
        if (confirm('Êtes-vous sûr de vouloir vous déconnecter ?')) {
            window.location.href = '{% url "logout" %}';
        }
    });
    
    // Fonction pour afficher des messages
    function showMessage(message, type) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;
        messageDiv.textContent = message;
        messageDiv.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            z-index: 10000;
            animation: slideInRight 0.3s ease-out;
        `;
        
        if (type === 'success') {
            messageDiv.style.background = '#27ae60';
        } else {
            messageDiv.style.background = '#e74c3c';
        }
        
        document.body.appendChild(messageDiv);
        
        // Supprimer le message après 3 secondes
        setTimeout(() => {
            messageDiv.remove();
        }, 3000);
    }
    
    // Animation pour les messages
    const style = document.createElement('style');
    style.textContent = `
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    `;
    document.head.appendChild(style);
});
</script>
{% endif %}
