<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ajouter un rendez-vous</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'front/css/add_rdv.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="rdv-modal">
    <div class="rdv-box">
      <h2>Ajouter un rendez-vous</h2>
      <form method="post" autocomplete="off">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        {% if from_new_client %}
          <input type="hidden" name="is_temp_rdv" value="1">
        {% endif %}

        <div class="rdv-field">
          <i class="fa fa-calendar"></i>
          <input type="date" name="date_rdv" required>
        </div>

        <div class="rdv-field">
          <i class="fa fa-clock"></i>
          <input type="time" name="heure_rdv" required>
        </div>

        <div class="rdv-field autocomplete-container">
          <i class="fa fa-user"></i>
          {% if from_new_client and client_temp %}
            <input type="text" disabled value="{{ client_temp.prenom }} {{ client_temp.nom }}">
          {% else %}
            <input type="text" id="clientSearch" placeholder="Rechercher un client..." required>
            <ul id="clientResults" class="autocomplete-results"></ul>
            <input type="hidden" name="client_id" id="client_id">
          {% endif %}
        </div>

        <div class="rdv-field">
          <i class="fa fa-tag"></i>
          <input type="text" name="objet" placeholder="Objet du rendez-vous" required>
        </div>

        <div class="rdv-field">
          <i class="fa fa-align-left"></i>
          <textarea name="notes" placeholder="Détails/Notes" rows="3"></textarea>
        </div>

        <div class="rdv-actions">
          <button id="cancelBtn" type="button" class="cancel-button">Annuler</button>
          <button type="submit" class="submit-button"><i class="fa fa-check"></i> Valider</button>
        </div>
      </form>
    </div>
  </div>

  <div class="success-message" id="successMessage">
    <i class="fa fa-check-circle"></i> Rendez-vous ajouté avec succès
  </div>

  {% if not from_new_client %}
  <script id="client-data" type="application/json">
    [
      {% for client in clients %}
        {
          "id": "{{ client.id }}",
          "nom": "{{ client.nom|escapejs }}",
          "prenom": "{{ client.prenom|escapejs }}"
        }{% if not forloop.last %},{% endif %}
      {% endfor %}
    ]
  </script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const form = document.querySelector("form");
      const successMessage = document.getElementById("successMessage");
      const cancelBtn = document.getElementById("cancelBtn");
      const inputs = form.querySelectorAll("input, textarea, select");
      const nextUrl = document.querySelector("input[name='next']").value || "/dashboard";

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        if (form.checkValidity()) {
          successMessage.style.display = "flex";
          setTimeout(() => form.submit(), 1500);
        } else {
          form.reportValidity();
        }
      });

      cancelBtn.addEventListener("click", () => {
        let hasData = false;
        inputs.forEach(input => {
          if (input.value.trim() !== "") hasData = true;
        });
        if (hasData) {
          if (confirm("Des informations ont été saisies. Voulez-vous vraiment quitter cette page ?")) {
            window.location.href = nextUrl;
          }
        } else {
          window.location.href = nextUrl;
        }
      });

      // Code d'autocomplétion client
      const input = document.getElementById("clientSearch");
      const results = document.getElementById("clientResults");
      const hiddenInput = document.getElementById("client_id");

      const rawJson = document.getElementById("client-data").textContent;
      const clients = JSON.parse(rawJson);

      input.addEventListener("input", function () {
        const value = this.value.toLowerCase();
        results.innerHTML = "";
        if (value.length === 0) return;

        const matches = clients.filter(c =>
          (`${c.prenom} ${c.nom}`).toLowerCase().includes(value)
        );

        matches.forEach(client => {
          const li = document.createElement("li");
          li.textContent = `${client.prenom} ${client.nom}`;
          li.classList.add("autocomplete-item");
          li.addEventListener("click", () => {
            input.value = `${client.prenom} ${client.nom}`;
            hiddenInput.value = client.id;
            results.innerHTML = "";
          });
          results.appendChild(li);
        });
      });

      document.addEventListener("click", (e) => {
        if (!results.contains(e.target) && e.target !== input) {
          results.innerHTML = "";
        }
      });
    });
  </script>
  {% else %}
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const form = document.querySelector("form");
      const successMessage = document.getElementById("successMessage");
      const cancelBtn = document.getElementById("cancelBtn");
      const inputs = form.querySelectorAll("input, textarea, select");
      const nextUrl = document.querySelector("input[name='next']").value || "/dashboard";

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        if (form.checkValidity()) {
          successMessage.style.display = "flex";
          setTimeout(() => form.submit(), 1500);
        } else {
          form.reportValidity();
        }
      });

      cancelBtn.addEventListener("click", () => {
        let hasData = false;
        inputs.forEach(input => {
          if (input.value.trim() !== "") hasData = true;
        });
        if (hasData) {
          if (confirm("Des informations ont été saisies. Voulez-vous vraiment quitter cette page ?")) {
            window.location.href = nextUrl;
          }
        } else {
          window.location.href = nextUrl;
        }
      });
      // Pas de code d'autocomplétion client ici
    });
  </script>
  {% endif %}
</body>
</html>
