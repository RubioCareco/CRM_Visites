{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Réinitialisation du mot de passe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'front/css/reset_password.css' %}">
    <link rel="stylesheet" href="{% static 'front/css/new_client.css' %}">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-container reset-password-container">
            <h2>Réinitialisation du mot de passe</h2>
            {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
            <p>Entrez votre adresse email pour recevoir un lien de réinitialisation.</p>

            <div class="form-box">
                <form method="post" id="resetForm">
                    {% csrf_token %}
                    <div class="input-wrapper input-reset">
                        <i class="fa fa-envelope icon"></i>
                        <input type="email" name="email" placeholder="Adresse email" required>
                    </div>
                    <button type="submit" class="btn-reset">Envoyer le lien</button>
                </form>

                <!-- Toast premium harmonisé (import-toast) -->
                <div id="import-toast" class="import-toast">
                    <i class="fa-solid fa-circle-check"></i>
                    <span id="import-toast-text">Un email de réinitialisation a été envoyé !</span>
                </div>

                <a href="{% url 'login' %}" class="forgot-password">← Retour à la connexion</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('resetForm');
            const toast = document.getElementById('import-toast');
            const toastText = document.getElementById('import-toast-text');
            const toastIcon = toast.querySelector('i');
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const formData = new FormData(form);
                fetch(window.location.pathname, {
                    method: 'POST',
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest',
                    },
                    body: formData
                })
                .then(response => {
                    if (response.ok) {
                        toast.className = 'import-toast show';
                        toastIcon.className = 'fa-solid fa-circle-check';
                        toast.style.background = 'rgba(40, 167, 69, 0.97)';
                        toastText.textContent = 'Un email de réinitialisation a été envoyé !';
                        setTimeout(() => {
                            window.location.href = '/login/';
                        }, 3000);
                    } else {
                        return response.text().then(text => { throw new Error(text); });
                    }
                })
                .catch(error => {
                    toast.className = 'import-toast show error';
                    toastIcon.className = 'fa-solid fa-circle-xmark';
                    toast.style.background = 'rgba(211, 47, 47, 0.97)';
                    toastText.textContent = "Erreur lors de l'envoi de l'email.";
                    setTimeout(() => {
                        toast.className = 'import-toast';
                    }, 3500);
                });
            });
        });
    </script>

</body>
</html>
