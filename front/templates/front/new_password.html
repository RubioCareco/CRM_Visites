{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'front/css/new_password.css' %}">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-container">
            <img src="{% static 'front/img/Rubio2-removebg-preview.png' %}" alt="Logo" class="logo">
            <h2>Définir un nouveau mot de passe</h2>

            {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
            {% if success %}
            <script>
              setTimeout(function() {
                window.location.href = "{% url 'login' %}";
              }, 1000);
            </script>
            {% endif %}
            {% if not success %}
            <div class="form-box">
                <form method="post" id="passwordForm">
                    {% csrf_token %}
                    <input type="hidden" name="token" value="{{ token }}">
                    <div class="input-wrapper">
                        <i class="fa fa-lock icon"></i>
                        <input type="password" name="password" id="password" placeholder="Nouveau mot de passe" required>
                    </div>
                    <div class="input-wrapper">
                        <i class="fa fa-lock icon"></i>
                        <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirmer le nouveau mot de passe" required>
                    </div>
                    <div class="error-message" id="passwordError">Les mots de passe ne correspondent pas.</div>
                    <button type="submit" class="btn-reset">Valider</button>
                </form>
            </div>
            <script>
              document.addEventListener('DOMContentLoaded', function() {
                const form = document.getElementById('passwordForm');
                const pwd = document.getElementById('password');
                const confirm = document.getElementById('confirm_password');
                const error = document.getElementById('passwordError');
                error.style.display = 'none';
                form.addEventListener('submit', function(e) {
                  if (pwd.value !== confirm.value) {
                    error.style.display = 'block';
                    e.preventDefault();
                  } else {
                    error.style.display = 'none';
                  }
                });
              });
            </script>
            {% endif %}

            <a href="{% url 'login' %}" class="back-login">← Retour</a>
        </div>
    </div>

</body>
</html>
