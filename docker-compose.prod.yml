services:
  nginx:
    build: ./nginx
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"                            # publier en 80 en prod
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - staticfiles:/app/staticfiles:ro
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    networks: [app_net]
    restart: unless-stopped

  web:
    image: ghcr.io/rubiocareco/crm_visites-web:latest
    pull_policy: always
    env_file: .env.prod
    depends_on:
      db:
        condition: service_started        # ou service_healthy si ton db a un healthcheck
    ports: []                             # PAS d’exposition directe en prod
    expose:
      - "8000"
    volumes:
      - staticfiles:/app/staticfiles
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:8000/healthz -o /dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s
    networks: [app_net]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    networks: [app_net]                   # hérite du service base

volumes:
  staticfiles:

networks:
  app_net:
    driver: bridge

