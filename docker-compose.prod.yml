services:
  nginx:
    build: ./nginx
    depends_on:
      - web
    ports:
      - "80:80"                            # publier en 80 en prod
      # (si besoin de debug: remplace par "8080:80" temporairement)
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - staticfiles:/app/staticfiles:ro
    networks: [app_net]
    restart: unless-stopped

  web:
    build: .
    env_file: .env.prod
    depends_on:
      - db
    ports: []                               # PAS d’exposition directe en prod
    expose:
      - "8000"
    volumes:
      - staticfiles:/app/staticfiles
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import sys,urllib.request as u;r=u.urlopen('http://127.0.0.1:8000/',timeout=3);sys.exit(0 if 200<=r.status<400 else 1)"
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s
    networks: [app_net]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    networks: [app_net]                     # hérite du service base

volumes:
  staticfiles:

networks:
  app_net:
    driver: bridge
