{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Réinitialisation du mot de passe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'front/css/reset_password.css' %}">
    <link rel="stylesheet" href="{% static 'front/css/new_client.css' %}">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-container reset-password-container">
            <h2>Réinitialisation du mot de passe</h2>
            <p>Entrez votre adresse email pour recevoir un lien de réinitialisation.</p>

            <div class="form-box">
                <form method="post" id="resetForm">
                    {% csrf_token %}
                    <div class="input-wrapper input-reset">
                        <i class="fa fa-envelope icon"></i>
                        <input type="email" name="email" placeholder="Adresse email" required>
                    </div>
                    <button type="submit" class="btn-reset">Envoyer le lien</button>
                </form>

                <a href="{% url 'login' %}" class="forgot-password">← Retour à la connexion</a>
            </div>
        </div>
    </div>
    <div id="rpToastStack" class="dbt-toast-stack" aria-live="polite" aria-atomic="false"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('resetForm');
            const toastStack = document.getElementById('rpToastStack');

            function showToast(message, tone = 'success') {
                if (!toastStack) return;
                const toast = document.createElement('div');
                toast.className = `dbt-toast ${tone}`;
                toast.setAttribute('role', 'status');
                toast.innerHTML = `<span>${message}</span><button type="button" aria-label="Fermer">×</button>`;
                toastStack.appendChild(toast);

                const closeBtn = toast.querySelector('button');
                let closed = false;
                const removeToast = () => {
                    if (closed) return;
                    closed = true;
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 220);
                };

                closeBtn.addEventListener('click', removeToast);
                requestAnimationFrame(() => toast.classList.add('show'));
                setTimeout(removeToast, 7000);
            }

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const formData = new FormData(form);
                fetch(window.location.pathname, {
                    method: 'POST',
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest',
                    },
                    body: formData
                })
                .then(response => response.json().then(data => ({ ok: response.ok, data })))
                .then(({ ok, data }) => {
                    if (ok && data.success) {
                        showToast(data.message || 'Le lien de réinitialisation a bien été envoyé.', 'success');
                        form.reset();
                        return;
                    }
                    showToast(
                        (data && data.message) || "Cette adresse email n'existe pas dans la base.",
                        'error'
                    );
                })
                .catch(() => {
                    showToast("Erreur lors de l'envoi de l'email.", 'error');
                });
            });
        });
    </script>

</body>
</html>
